name: Build All Platforms

on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - "v*"           # 打 tag 如 v1.0.0 时自动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      - run: cd simple_live_app && flutter pub get
      - run: cd simple_live_app && flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: Android-APKs
          path: simple_live_app/build/app/outputs/flutter-apk/app-*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: cd simple_live_app && flutter pub get
      - run: dart pub global activate flutter_distributor
      - run: cd simple_live_app && flutter_distributor package --platform windows --targets msix,zip --skip-clean

      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: simple_live_app/build/dist/*/*.*

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: cd simple_live_app && flutter pub get
      - run: dart pub global activate flutter_distributor
      - run: npm install -g appdmg
      - run: cd simple_live_app && flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: simple_live_app/build/dist/*/*.*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv
      - run: flutter config --enable-linux-desktop
      - run: cd simple_live_app && flutter pub get
      - run: dart pub global activate flutter_distributor
      - run: cd simple_live_app && flutter_distributor package --platform linux --targets deb,zip --skip-clean

      - uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: simple_live_app/build/dist/*/*.*
