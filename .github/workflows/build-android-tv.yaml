name: Build Android + TV

on:
  workflow_dispatch:     # 手动触发
  push:
    branches: [ master ]
    tags:
      - 'v*'             # 打 tag 如 v1.2.3 时自动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      - name: Get dependencies
        run: cd simple_live_app && flutter pub get

      - name: Build Android APK (手机/平板)
        run: cd simple_live_app && flutter build apk --release --split-per-abi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: simple_live_app/build/app/outputs/flutter-apk/app-*.apk

  build-android-tv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      - name: Get dependencies
        run: cd simple_live_tv_app && flutter pub get

      - name: Build Android TV APK
        run: cd simple_live_tv_app && flutter build apk --release

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-TV-APK
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk
